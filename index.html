<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>神庙逃亡 shenmiao2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #1a1a2e;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            touch-action: none;
        }
        
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 100%;
            max-height: 100%;
        }
        
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #0a0a15;
            image-rendering: pixelated;
        }
        
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.9);
            z-index: 100;
        }
        
        .hidden {
            display: none !important;
        }
        
        .title {
            font-size: clamp(2rem, 8vw, 4rem);
            color: #4ade80;
            text-shadow: 4px 4px 0px #166534, -2px -2px 0px #22c55e;
            margin-bottom: 10px;
            text-align: center;
            font-weight: bold;
            letter-spacing: 4px;
        }
        
        .subtitle {
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            color: #6b7280;
            margin-bottom: 30px;
            font-family: 'Courier New', monospace;
        }
        
        .btn {
            padding: 12px 40px;
            font-size: clamp(1rem, 4vw, 1.5rem);
            border: 4px solid #000;
            cursor: pointer;
            margin: 10px;
            transition: all 0.1s ease;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            box-shadow: 4px 4px 0px #000;
        }
        
        .btn-primary {
            background: #4ade80;
            color: #000;
        }
        
        .btn-primary:hover, .btn-primary:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #000;
        }
        
        .btn-secondary {
            background: #6b7280;
            color: #fff;
        }
        
        .btn-secondary:hover, .btn-secondary:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #000;
        }
        
        .character-select {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .character-card {
            width: 80px;
            height: 100px;
            border: 4px solid #374151;
            cursor: pointer;
            transition: all 0.1s ease;
            background: #1f2937;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 4px 4px 0px #000;
        }
        
        .character-card.selected {
            border-color: #4ade80;
            background: #166534;
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #000;
        }
        
        .character-card .emoji {
            font-size: 2.5rem;
        }
        
        .character-card .name {
            font-size: 10px;
            color: #fff;
            text-align: center;
            margin-top: 5px;
            font-family: 'Courier New', monospace;
        }
        
        .character-card .stats {
            font-size: 8px;
            color: #9ca3af;
            text-align: center;
            font-family: 'Courier New', monospace;
        }
        
        .stat-row {
            display: flex;
            gap: 20px;
            margin: 15px 0;
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            color: #fff;
        }
        
        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Courier New', monospace;
        }
        
        .stat-icon {
            font-size: 1.5rem;
        }
        
        .new-record {
            color: #fbbf24;
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            animation: blink 0.5s ease infinite alternate;
            font-family: 'Courier New', monospace;
            text-shadow: 3px 3px 0px #000;
        }
        
        @keyframes blink {
            from { opacity: 1; }
            to { opacity: 0.5; }
        }
        
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 50;
        }
        
        .hud-left, .hud-right {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .hud-item {
            background: #1f2937;
            padding: 8px 16px;
            border: 3px solid #000;
            color: #fff;
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 3px 3px 0px #000;
            font-family: 'Courier New', monospace;
        }
        
        .hud-item .icon {
            font-size: 1.2rem;
        }
        
        #pauseBtn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 50px;
            height: 50px;
            background: #1f2937;
            border: 3px solid #000;
            color: #fff;
            font-size: 1.4rem;
            cursor: pointer;
            z-index: 60;
            pointer-events: auto;
            transition: all 0.1s ease;
            box-shadow: 3px 3px 0px #000;
            font-family: 'Courier New', monospace;
        }
        
        #pauseBtn:hover {
            transform: translate(1px, 1px);
            box-shadow: 2px 2px 0px #000;
        }
        
        .controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            display: none !important;  /* 隐藏底部按钮 - 只保留触摸滑动操作 */
            justify-content: space-between;
            padding: 0 20px;
            z-index: 50;
        }
        
        .control-group {
            display: flex;
            gap: 10px;
        }
        
        .control-btn {
            width: 70px;
            height: 70px;
            border: 3px solid #000;
            background: #374151;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            transition: all 0.1s;
            box-shadow: 3px 3px 0px #000;
            font-family: 'Courier New', monospace;
        }
        
        .control-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px #000;
        }
        
        .control-btn.jump {
            background: #166534;
        }
        
        .control-btn.slide {
            background: #1e3a5f;
        }
        
        .control-btn.left, .control-btn.right {
            background: #78350f;
        }
        
        .control-btn .icon {
            font-size: 1.5rem;
        }
        
        .control-btn span:last-child {
            font-size: 0.6rem;
        }
        
        .direction-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .direction-btn {
            width: 60px;
            height: 60px;
        }
        
        .instructions {
            color: #6b7280;
            font-size: clamp(0.7rem, 2vw, 0.9rem);
            text-align: center;
            margin-top: 20px;
            max-width: 300px;
            font-family: 'Courier New', monospace;
        }
        
        .logo-icon {
            font-size: 4rem;
            margin-bottom: 10px;
            image-rendering: pixelated;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <!-- HUD -->
        <div id="hud" class="hidden">
            <div class="hud-left">
                <div class="hud-item"><span>🪙</span><span id="coinCount">0</span></div>
                <div class="hud-item"><span>📏</span><span id="distance">0</span><span>米</span></div>
            </div>
            <div class="hud-right">
                <div class="hud-item"><span>⚡</span><span id="speed">1.0</span><span>x</span></div>
            </div>
        </div>
        
        <button id="pauseBtn" class="hidden">⏸️</button>
        
        <div class="controls hidden" id="mobileControls">
            <div class="control-group direction-controls">
                <button class="control-btn left direction-btn" id="leftBtn">◀</button>
                <button class="control-btn right direction-btn" id="rightBtn">▶</button>
            </div>
            <div class="control-group">
                <button class="control-btn jump" id="jumpBtn"><span class="icon">⬆</span><span>跳跃</span></button>
                <button class="control-btn slide" id="slideBtn"><span class="icon">⬇</span><span>滑铲</span></button>
            </div>
        </div>
        
        <!-- 开始界面 -->
        <div id="startScreen" class="overlay">
            <div class="logo-icon">🏛️</div>
            <h1 class="title">神庙逃亡</h1>
            <p class="subtitle">shenmiao2026</p>
            
            <p style="color: #6b7280; margin-bottom: 15px; font-family: 'Courier New', monospace;">选择角色</p>
            <div class="character-select" id="characterSelect"></div>
            
            <button class="btn btn-primary" id="startBtn">开始游戏</button>
            
            <p class="instructions">
                ◀ ▶ 左右移动 | ⬆ 跳跃 | ⬇ 滑铲<br>
                键盘: A/D 或 ←/→ 移动, W/↑ 跳跃, S/↓ 滑铲
            </p>
        </div>
        
        <!-- 暂停界面 -->
        <div id="pauseScreen" class="overlay hidden">
            <h2 class="title">⏸️ 暂停</h2>
            <button class="btn btn-primary" id="resumeBtn">继续游戏</button>
            <button class="btn btn-secondary" id="restartFromPauseBtn">重新开始</button>
            <button class="btn btn-secondary" id="quitBtn">返回主菜单</button>
        </div>
        
        <!-- 游戏结束界面 -->
        <div id="gameOverScreen" class="overlay hidden">
            <h2 class="title" style="color: #ef4444;">💀 游戏结束</h2>
            <p id="newRecordText" class="new-record hidden">🏆 新纪录!</p>
            
            <div class="stat-row">
                <div class="stat-item">
                    <span class="stat-icon">📏</span>
                    <span id="finalDistance">0</span><span>米</span>
                </div>
            </div>
            <div class="stat-row">
                <div class="stat-item">
                    <span class="stat-icon">🪙</span>
                    <span id="finalCoins">0</span>
                </div>
            </div>
            <div class="stat-row">
                <div class="stat-item">
                    <span class="stat-icon">🏆</span>
                    <span>最高:</span>
                    <span id="bestDistance">0</span><span>米</span>
                </div>
            </div>
            
            <button class="btn btn-primary" id="restartBtn">再来一局</button>
            <button class="btn btn-secondary" id="menuBtn">返回主菜单</button>
        </div>
    </div>

    <script>
        // ========== 像素风格配置 ==========
        const PIXEL_CONFIG = {
            // 角色emoji
            playerEmoji: '🏃',
            deadEmoji: '💀',
            coinCollectEmoji: '💰',  // 钱袋/硬币
            
            // 障碍物emoji映射 - 交通主题
            obstacleEmojis: {
                car: '🚗',      // 汽车
                motorcycle: '🏍️', // 摩托车
                cone: '🚧',      // 三角桶/交通锥
                truck: '🚚',     // 卡车
            },
            
            // 道路颜色（像素风格）
            roadColors: {
                main: '#3d2817',      // 主道路
                line: '#5a3d2b',     // 车道线
                gridLine: '#2a1d10', // 网格线
                edge: '#8b7355',     // 道路边缘
                shadow: '#1a0f08',    // 阴影
            },
            
            // 背景颜色（像素风格渐变）
            bgColors: {
                top: '#0f0f23',
                middle: '#1a1a3e',
                bottom: '#2d1f3d',
            },
            
            // 装饰物颜色 - 道路两侧装饰
            decorationColors: ['🌴', '🌲', '🌳', '🏠', '🐱', '🐕', '🌵', '🪨', '🌿', '🏡', '🦎', '🐦'],
        };

        // ========== 角色数据（使用emoji） ==========
        const CHARACTERS = [
            { name: '探险家A', emoji: '🧑‍🎤', speed: 1.0, coinBonus: 1.0 },
            { name: '探险家B', emoji: '🧑‍🔧', speed: 1.1, coinBonus: 1.0 },
            { name: '女探险家', emoji: '🧑‍🚀', speed: 0.95, coinBonus: 1.2 },
        ];

        // ========== 游戏配置 ==========
        const CONFIG = {
            LANE_COUNT: 3,
            LANE_WIDTH_RATIO: 0.25,
            PLAYER_Y_RATIO: 0.95,       // 玩家在屏幕下方5%
            INITIAL_SPEED: 10,           // 初始速度10
            MAX_SPEED: 20,               // 从15改为20
            SPEED_INCREMENT: 0.002,      // 从0.001改为0.002
            JUMP_HEIGHT: 120,
            JUMP_DURATION: 500,
            SLIDE_DURATION: 400,
            LANE_SWITCH_DURATION: 150,
            OBSTACLE_SPAWN_INTERVAL: 2500,  // 从1500改为2500
            COIN_SPAWN_INTERVAL: 1200,       // 从800改为1200
            PERSPECTIVE_SCALE: 0.3,
            HORIZON_Y_RATIO: 0.30,           // 从0.35改为0.30
            ROAD_WIDTH_RATIO: 0.6,            // 道路宽度占屏幕宽度的比例
        };

        // ========== 游戏状态 ==========
        const GameState = {
            MENU: 'menu',
            PLAYING: 'playing',
            PAUSED: 'paused',
            GAME_OVER: 'gameOver'
        };

        // ========== 游戏类 ==========
        class TempleRunGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.state = GameState.MENU;
                this.selectedCharacter = 0;
                this.bestDistance = parseInt(localStorage.getItem('templeRunBest') || '0');
                
                this.images = {};
                this.imagesLoaded = true; // 不再依赖图片加载
                
                this.init();
                this.setupEventListeners();
                this.resize();
                
                window.addEventListener('resize', () => this.resize());
            }

            init() {
                this.player = {
                    lane: 1, // 0: 左, 1: 中, 2: 右
                    targetLane: 1,
                    x: 0,
                    y: 0,
                    width: 60,
                    height: 100,
                    isJumping: false,
                    isSliding: false,
                    jumpY: 0,
                    slideTimer: 0,
                    jumpTimer: 0,
                    laneTransition: 0,
                    animFrame: 0,
                };
                
                this.coins = 0;
                this.distance = 0;
                this.speed = CONFIG.INITIAL_SPEED;
                this.obstacles = [];
                this.collectibles = [];
                this.decorations = [];
                this.particles = [];
                this.dustParticles = [];
                
                this.lastObstacleSpawn = 0;
                this.lastCoinSpawn = 0;
                this.bgOffset = 0;
                this.roadOffset = 0;
                
                this.keys = {};
            }

            resize() {
                const container = document.getElementById('gameContainer');
                this.canvas.width = container.clientWidth;
                this.canvas.height = container.clientHeight;
                
                this.centerX = this.canvas.width / 2;
                this.horizonY = this.canvas.height * CONFIG.HORIZON_Y_RATIO;
                this.laneWidth = this.canvas.width * CONFIG.LANE_WIDTH_RATIO;
                this.playerBaseY = this.canvas.height * CONFIG.PLAYER_Y_RATIO;
                this.roadWidthBottom = this.canvas.width * CONFIG.ROAD_WIDTH_RATIO; // 道路宽度
                
                if (this.state === GameState.PLAYING) {
                    this.updatePlayerPosition();
                }
            }

            setupEventListeners() {
                // 键盘事件
                document.addEventListener('keydown', (e) => {
                    this.keys[e.key] = true;
                    this.handleKeyboardInput(e);
                });
                
                document.addEventListener('keyup', (e) => {
                    this.keys[e.key] = false;
                });

                // 触摸滑动
                let touchStartX = 0;
                let touchStartY = 0;
                
                this.canvas.addEventListener('touchstart', (e) => {
                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                }, { passive: true });
                
                this.canvas.addEventListener('touchend', (e) => {
                    if (this.state !== GameState.PLAYING) return;
                    
                    const touchEndX = e.changedTouches[0].clientX;
                    const touchEndY = e.changedTouches[0].clientY;
                    const dx = touchEndX - touchStartX;
                    const dy = touchEndY - touchStartY;
                    
                    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 30) {
                        if (dx > 0) this.moveRight();
                        else this.moveLeft();
                    } else if (Math.abs(dy) > 30) {
                        if (dy < 0) this.jump();
                        else this.slide();
                    }
                }, { passive: true });

                // 按钮事件
                document.getElementById('startBtn').addEventListener('click', () => this.startGame());
                document.getElementById('restartBtn').addEventListener('click', () => this.startGame());
                document.getElementById('menuBtn').addEventListener('click', () => this.showMenu());
                document.getElementById('pauseBtn').addEventListener('click', () => this.pauseGame());
                document.getElementById('resumeBtn').addEventListener('click', () => this.resumeGame());
                document.getElementById('restartFromPauseBtn').addEventListener('click', () => this.startGame());
                document.getElementById('quitBtn').addEventListener('click', () => this.showMenu());
                
                // 移动端控制按钮
                document.getElementById('leftBtn').addEventListener('click', () => this.moveLeft());
                document.getElementById('rightBtn').addEventListener('click', () => this.moveRight());
                document.getElementById('jumpBtn').addEventListener('click', () => this.jump());
                document.getElementById('slideBtn').addEventListener('click', () => this.slide());
                
                // ESC暂停
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') {
                        if (this.state === GameState.PLAYING) this.pauseGame();
                        else if (this.state === GameState.PAUSED) this.resumeGame();
                    }
                });

                // 角色选择
                this.renderCharacterSelect();
            }

            handleKeyboardInput(e) {
                if (this.state !== GameState.PLAYING) return;
                
                switch(e.key.toLowerCase()) {
                    case 'a':
                    case 'arrowleft':
                        this.moveLeft();
                        break;
                    case 'd':
                    case 'arrowright':
                        this.moveRight();
                        break;
                    case 'w':
                    case 'arrowup':
                    case ' ':
                        this.jump();
                        e.preventDefault();
                        break;
                    case 's':
                    case 'arrowdown':
                        this.slide();
                        break;
                }
            }

            moveLeft() {
                if (this.state !== GameState.PLAYING) return;
                if (this.player.targetLane > 0) {
                    this.player.targetLane--;
                    this.player.laneTransition = 0;
                }
            }

            moveRight() {
                if (this.state !== GameState.PLAYING) return;
                if (this.player.targetLane < CONFIG.LANE_COUNT - 1) {
                    this.player.targetLane++;
                    this.player.laneTransition = 0;
                }
            }

            jump() {
                if (this.state !== GameState.PLAYING) return;
                if (!this.player.isJumping && !this.player.isSliding) {
                    this.player.isJumping = true;
                    this.player.jumpTimer = 0;
                }
            }

            slide() {
                if (this.state !== GameState.PLAYING) return;
                if (!this.player.isJumping && !this.player.isSliding) {
                    this.player.isSliding = true;
                    this.player.slideTimer = 0;
                }
            }

            renderCharacterSelect() {
                const container = document.getElementById('characterSelect');
                container.innerHTML = '';
                
                CHARACTERS.forEach((char, index) => {
                    const card = document.createElement('div');
                    card.className = 'character-card' + (index === this.selectedCharacter ? ' selected' : '');
                    card.innerHTML = `
                        <span class="emoji">${char.emoji}</span>
                        <div class="name">${char.name}</div>
                        <div class="stats">⚡${char.speed} 🪙${char.coinBonus}</div>
                    `;
                    card.addEventListener('click', () => {
                        this.selectedCharacter = index;
                        this.renderCharacterSelect();
                    });
                    container.appendChild(card);
                });
            }

            async startGame() {
                this.hideAllScreens();
                this.init();
                
                const char = CHARACTERS[this.selectedCharacter];
                this.speed = CONFIG.INITIAL_SPEED * char.speed;
                this.coinMultiplier = char.coinBonus;
                
                this.state = GameState.PLAYING;
                document.getElementById('hud').classList.remove('hidden');
                document.getElementById('pauseBtn').classList.remove('hidden');
                // 隐藏移动端控制按钮 - 只保留触摸滑动操作
                // document.getElementById('mobileControls').classList.remove('hidden');
                
                this.lastTime = performance.now();
                this.gameLoop();
            }

            pauseGame() {
                if (this.state !== GameState.PLAYING) return;
                this.state = GameState.PAUSED;
                document.getElementById('pauseScreen').classList.remove('hidden');
            }

            resumeGame() {
                if (this.state !== GameState.PAUSED) return;
                this.state = GameState.PLAYING;
                document.getElementById('pauseScreen').classList.add('hidden');
                this.lastTime = performance.now();
                this.gameLoop();
            }

            gameOver() {
                this.state = GameState.GAME_OVER;
                
                // 更新最高分
                const isNewRecord = this.distance > this.bestDistance;
                if (isNewRecord) {
                    this.bestDistance = Math.floor(this.distance);
                    localStorage.setItem('templeRunBest', this.bestDistance.toString());
                }
                
                document.getElementById('hud').classList.add('hidden');
                document.getElementById('pauseBtn').classList.add('hidden');
                document.getElementById('mobileControls').classList.add('hidden');
                document.getElementById('gameOverScreen').classList.remove('hidden');
                
                document.getElementById('finalDistance').textContent = Math.floor(this.distance);
                document.getElementById('finalCoins').textContent = this.coins;
                document.getElementById('bestDistance').textContent = this.bestDistance;
                document.getElementById('newRecordText').classList.toggle('hidden', !isNewRecord);
            }

            showMenu() {
                this.hideAllScreens();
                this.state = GameState.MENU;
                document.getElementById('startScreen').classList.remove('hidden');
            }

            hideAllScreens() {
                document.getElementById('startScreen').classList.add('hidden');
                document.getElementById('pauseScreen').classList.add('hidden');
                document.getElementById('gameOverScreen').classList.add('hidden');
                document.getElementById('hud').classList.add('hidden');
                document.getElementById('pauseBtn').classList.add('hidden');
                document.getElementById('mobileControls').classList.add('hidden');
            }

            updatePlayerPosition() {
                const laneOffset = (this.player.lane - 1) * this.laneWidth;
                this.player.x = this.centerX + laneOffset;
                this.player.y = this.playerBaseY;
            }

            gameLoop(currentTime = performance.now()) {
                if (this.state !== GameState.PLAYING) return;
                
                const deltaTime = Math.min((currentTime - this.lastTime) / 1000, 0.1);
                this.lastTime = currentTime;
                
                this.update(deltaTime);
                this.render();
                
                requestAnimationFrame((t) => this.gameLoop(t));
            }

            update(dt) {
                // 更新速度
                this.speed = Math.min(CONFIG.MAX_SPEED, this.speed + CONFIG.SPEED_INCREMENT);
                
                // 更新距离
                this.distance += this.speed * dt * 10;
                
                // 更新玩家位置（车道切换动画）
                this.player.lane += (this.player.targetLane - this.player.lane) * 0.2;
                this.updatePlayerPosition();
                
                // 更新跳跃
                if (this.player.isJumping) {
                    this.player.jumpTimer += dt * 1000;
                    const progress = this.player.jumpTimer / CONFIG.JUMP_DURATION;
                    if (progress >= 1) {
                        this.player.isJumping = false;
                        this.player.jumpY = 0;
                    } else {
                        this.player.jumpY = Math.sin(progress * Math.PI) * CONFIG.JUMP_HEIGHT;
                    }
                }
                
                // 更新滑铲
                if (this.player.isSliding) {
                    this.player.slideTimer += dt * 1000;
                    if (this.player.slideTimer >= CONFIG.SLIDE_DURATION) {
                        this.player.isSliding = false;
                    }
                }
                
                // 更新动画帧
                this.player.animFrame += dt * 10;
                
                // 更新背景偏移
                this.bgOffset += this.speed * dt * 0.5;
                this.roadOffset += this.speed * dt;
                
                // 生成障碍物
                if (performance.now() - this.lastObstacleSpawn > this.getObstacleSpawnInterval()) {
                    this.spawnObstacle();
                    this.lastObstacleSpawn = performance.now();
                }
                
                // 生成金币
                if (performance.now() - this.lastCoinSpawn > CONFIG.COIN_SPAWN_INTERVAL) {
                    this.spawnCoins();
                    this.lastCoinSpawn = performance.now();
                }
                
                // 更新障碍物和金币
                this.updateObstacles(dt);
                this.updateCollectibles(dt);
                this.updateDecorations(dt);
                this.updateParticles(dt);
                this.updateDustParticles(dt);
                
                // 生成尘土粒子
                if (Math.random() < 0.3) {
                    this.spawnDustParticle();
                }
                
                // 碰撞检测
                this.checkCollisions();
                
                // 更新HUD
                this.updateHUD();
            }

            getObstacleSpawnInterval() {
                const baseInterval = CONFIG.OBSTACLE_SPAWN_INTERVAL;
                const difficulty = Math.min(this.distance / 5000, 1);
                return baseInterval * (1 - difficulty * 0.5);
            }

            spawnObstacle() {
                const lane = Math.floor(Math.random() * CONFIG.LANE_COUNT);
                const types = ['car', 'motorcycle', 'cone', 'truck'];
                const typeIndex = Math.floor(Math.random() * types.length);
                const type = types[typeIndex];
                
                this.obstacles.push({
                    lane: lane,
                    z: 3000,  // 从2000改为3000
                    type: type,
                    width: 80,
                    height: type === 'cone' ? 50 : 80,
                });
            }

            spawnCoins() {
                const lane = Math.floor(Math.random() * CONFIG.LANE_COUNT);
                const count = Math.floor(Math.random() * 3) + 1;
                
                for (let i = 0; i < count; i++) {
                    this.collectibles.push({
                        lane: lane,
                        z: 3000 + i * 50,  // 从2000改为3000
                        type: 'coin',
                        width: 40,
                        height: 40,
                        rotation: Math.random() * Math.PI * 2,
                    });
                }
                
                // 随机生成装饰物（增加生成频率）
                if (Math.random() < 0.4) {
                    const decoEmoji = PIXEL_CONFIG.decorationColors[
                        Math.floor(Math.random() * PIXEL_CONFIG.decorationColors.length)
                    ];
                    // 从道路两侧生成装饰物
                    const side = Math.random() < 0.5 ? -1 : 4;  // 左侧或右侧
                    this.decorations.push({
                        lane: side,
                        z: 3000,
                        emoji: decoEmoji,
                        width: 60,
                        height: 100,
                    });
                }
            }

            updateObstacles(dt) {
                for (let i = this.obstacles.length - 1; i >= 0; i--) {
                    this.obstacles[i].z -= this.speed * dt * 60;
                    if (this.obstacles[i].z < -100) {
                        this.obstacles.splice(i, 1);
                    }
                }
            }

            updateCollectibles(dt) {
                for (let i = this.collectibles.length - 1; i >= 0; i--) {
                    this.collectibles[i].z -= this.speed * dt * 60;
                    this.collectibles[i].rotation += dt * 5;
                    if (this.collectibles[i].z < -100) {
                        this.collectibles.splice(i, 1);
                    }
                }
            }

            updateDecorations(dt) {
                for (let i = this.decorations.length - 1; i >= 0; i--) {
                    this.decorations[i].z -= this.speed * dt * 60;
                    if (this.decorations[i].z < -100) {
                        this.decorations.splice(i, 1);
                    }
                }
            }

            checkCollisions() {
                const playerLane = Math.round(this.player.lane);
                const playerHeight = this.player.isSliding ? 50 : 100;
                const playerBottom = this.playerBaseY + 50;
                
                // 障碍物碰撞
                for (const obs of this.obstacles) {
                    if (Math.abs(obs.lane - playerLane) < 0.5 && obs.z > -20 && obs.z < 50) {
                        // 检查是否可以躲避
                        const canJump = obs.type !== 'rock' && obs.type !== 'box' && 
                                       this.player.isJumping && this.player.jumpY > 50;
                        const canSlide = (obs.type === 'rock' || obs.type === 'box') && 
                                         this.player.isSliding;
                        
                        if (!canJump && !canSlide) {
                            this.gameOver();
                            return;
                        }
                    }
                }
                
                // 金币收集
                for (let i = this.collectibles.length - 1; i >= 0; i--) {
                    const coin = this.collectibles[i];
                    if (Math.abs(coin.lane - playerLane) < 0.5 && coin.z > -20 && coin.z < 50) {
                        this.coins += Math.floor(this.coinMultiplier);
                        // 生成收集粒子
                        const scale = this.getScale(coin.z);
                        const pos = this.getScreenPosition(coin.lane, coin.z);
                        this.spawnCollectParticles(pos.x, pos.y - 30 * scale);
                        this.collectibles.splice(i, 1);
                    }
                }
            }

            updateHUD() {
                document.getElementById('coinCount').textContent = this.coins;
                document.getElementById('distance').textContent = Math.floor(this.distance);
                document.getElementById('speed').textContent = (this.speed / CONFIG.INITIAL_SPEED).toFixed(1);
                // 显示玩家位置百分比
                const playerYPercent = Math.floor((1 - CONFIG.PLAYER_Y_RATIO) * 100);
                document.getElementById('distance').title = `玩家位置: 下方${playerYPercent}%`;
                // 在游戏画面左下角显示玩家位置指示
                this.showPlayerPositionIndicator();
            }
            
            showPlayerPositionIndicator() {
                const ctx = this.ctx;
                const w = this.canvas.width;
                const h = this.canvas.height;
                const playerYPercent = Math.floor((1 - CONFIG.PLAYER_Y_RATIO) * 100);
                
                // 左下角位置指示器
                ctx.save();
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(10, h - 60, 120, 50);
                ctx.strokeStyle = '#ffd700';
                ctx.lineWidth = 2;
                ctx.strokeRect(10, h - 60, 120, 50);
                
                ctx.font = '14px Courier New';
                ctx.fillStyle = '#ffd700';
                ctx.textAlign = 'left';
                ctx.fillText(`👤 玩家: 下方${playerYPercent}%`, 18, h - 35);
                
                ctx.font = '10px Courier New';
                ctx.fillStyle = '#aaa';
                ctx.fillText(`Y=${CONFIG.PLAYER_Y_RATIO}`, 18, h - 18);
                ctx.restore();
            }

            render() {
                const ctx = this.ctx;
                const w = this.canvas.width;
                const h = this.canvas.height;
                
                // 清空画布
                ctx.clearRect(0, 0, w, h);
                
                // 绘制像素风格背景
                this.renderPixelBackground();
                
                // 绘制像素风格道路
                this.renderPixelRoad();
                
                // 绘制尘土粒子
                this.renderDustParticles();
                
                // 绘制装饰物
                this.renderDecorations();
                
                // 绘制金币
                this.renderCollectibles();
                
                // 绘制障碍物
                this.renderObstacles();
                
                // 绘制收集粒子
                this.renderParticles();
                
                // 绘制玩家
                this.renderPlayer();
            }

            renderPixelBackground() {
                const ctx = this.ctx;
                const w = this.canvas.width;
                const h = this.canvas.height;
                
                // 像素风格渐变背景
                const steps = 20;
                const stepHeight = this.horizonY / steps;
                
                for (let i = 0; i < steps; i++) {
                    const ratio = i / steps;
                    const r = Math.floor(15 + ratio * 32);
                    const g = Math.floor(15 + ratio * 16);
                    const b = Math.floor(35 + ratio * 58);
                    ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
                    ctx.fillRect(0, i * stepHeight, w, stepHeight + 1);
                }
                
                // 添加像素星星效果
                ctx.fillStyle = '#ffffff';
                const starCount = 30;
                for (let i = 0; i < starCount; i++) {
                    const x = (i * 137 + this.bgOffset * 0.1) % w;
                    const y = (i * 73) % this.horizonY;
                    const size = (i % 3 === 0) ? 2 : 1;
                    ctx.fillRect(Math.floor(x), Math.floor(y), size, size);
                }
                
                // 像素风格山丘轮廓
                ctx.fillStyle = '#1a0a2e';
                const hillOffset = this.bgOffset % 200;
                for (let x = 0; x < w; x += 20) {
                    const hillHeight = Math.sin((x + hillOffset) * 0.02) * 30 + 
                                       Math.sin((x + hillOffset) * 0.05) * 15;
                    ctx.fillRect(x, this.horizonY - hillHeight - 20, 22, hillHeight + 25);
                }
            }

            renderPixelRoad() {
                const ctx = this.ctx;
                const w = this.canvas.width;
                const h = this.canvas.height;
                
                // 透视参数
                const vanishX = this.centerX;  // 屏幕正中央
                const vanishY = this.horizonY;
                const roadWidthBottom = this.roadWidthBottom;  // 使用调整后的道路宽度
                const roadWidthTop = w * 0.08;  // 透视顶部宽度
                
                // 绘制道路底色
                ctx.fillStyle = PIXEL_CONFIG.roadColors.main;
                ctx.beginPath();
                ctx.moveTo(vanishX - roadWidthTop/2, vanishY);
                ctx.lineTo(vanishX + roadWidthTop/2, vanishY);
                ctx.lineTo(vanishX + roadWidthBottom/2, h);
                ctx.lineTo(vanishX - roadWidthBottom/2, h);
                ctx.closePath();
                ctx.fill();
                
                // 绘制像素网格线
                const gridSpacing = 40;
                const offset = this.roadOffset % gridSpacing;
                
                ctx.strokeStyle = PIXEL_CONFIG.roadColors.gridLine;
                ctx.lineWidth = 1;
                
                // 横线
                for (let z = offset; z < 3000; z += gridSpacing) {
                    const scale = this.getScale(z);
                    if (scale < 0.05) continue;
                    
                    const y = vanishY + (h - vanishY) * (1 - scale);
                    const roadWidthAtY = roadWidthBottom * scale;
                    
                    ctx.beginPath();
                    ctx.moveTo(vanishX - roadWidthAtY/2, y);
                    ctx.lineTo(vanishX + roadWidthAtY/2, y);
                    ctx.stroke();
                }
                
                // 道路边缘（像素风格）
                ctx.strokeStyle = PIXEL_CONFIG.roadColors.edge;
                ctx.lineWidth = 4;
                
                // 左边线
                ctx.beginPath();
                ctx.moveTo(vanishX, vanishY);
                ctx.lineTo(vanishX - roadWidthBottom/2, h);
                ctx.stroke();
                
                // 右边线
                ctx.beginPath();
                ctx.moveTo(vanishX, vanishY);
                ctx.lineTo(vanishX + roadWidthBottom/2, h);
                ctx.stroke();
                
                // 绘制像素车道分隔线
                const laneOffsets = [-1, 1];
                ctx.strokeStyle = PIXEL_CONFIG.roadColors.line;
                ctx.lineWidth = 3;
                ctx.setLineDash([15, 25]);
                
                for (const offset of laneOffsets) {
                    ctx.beginPath();
                    ctx.moveTo(vanishX, vanishY);
                    ctx.lineTo(vanishX + (roadWidthBottom / 2) * offset, h);
                    ctx.stroke();
                }
                
                ctx.setLineDash([]);
            }

            renderDecorations() {
                const ctx = this.ctx;
                const sorted = [...this.decorations].sort((a, b) => b.z - a.z);
                
                for (const deco of sorted) {
                    if (deco.z < 0 || deco.z > 3000) continue;  // 从2000改为3000
                    
                    const scale = this.getScale(deco.z);
                    const pos = this.getScreenPosition(deco.lane, deco.z);
                    
                    const drawSize = 60 * scale;
                    ctx.font = `${drawSize}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'bottom';
                    ctx.fillText(deco.emoji, pos.x, pos.y);
                }
            }

            renderCollectibles() {
                const ctx = this.ctx;
                const sorted = [...this.collectibles].sort((a, b) => b.z - a.z);
                
                for (const coin of sorted) {
                    if (coin.z < 0 || coin.z > 3000) continue;  // 从2000改为3000
                    
                    const scale = this.getScale(coin.z);
                    const pos = this.getScreenPosition(coin.lane, coin.z);
                    
                    const drawSize = 40 * scale;
                    
                    // 金币发光像素效果
                    ctx.save();
                    ctx.globalAlpha = 0.3;
                    ctx.fillStyle = '#ffd700';
                    const glowSize = drawSize * 1.5;
                    ctx.fillRect(pos.x - glowSize/2, pos.y - 30*scale - glowSize/2, glowSize, glowSize);
                    ctx.restore();
                    
                    // 绘制金币emoji
                    ctx.font = `${drawSize}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('🪙', pos.x, pos.y - 30 * scale);
                }
            }

            renderObstacles() {
                const ctx = this.ctx;
                const sorted = [...this.obstacles].sort((a, b) => b.z - a.z);
                
                for (const obs of sorted) {
                    if (obs.z < 0 || obs.z > 3000) continue;  // 从2000改为3000
                    
                    const scale = this.getScale(obs.z);
                    const pos = this.getScreenPosition(obs.lane, obs.z);
                    
                    // 根据类型选择emoji
                    let emoji;
                    switch(obs.type) {
                        case 'rock': emoji = '🪨'; break;
                        case 'tree': emoji = '🌳'; break;
                        case 'pillar': emoji = '🏛️'; break;
                        case 'box': emoji = '📦'; break;
                        default: emoji = '🗿';
                    }
                    
                    const drawSize = Math.max(obs.height * scale, 30);
                    ctx.font = `${drawSize}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'bottom';
                    ctx.fillText(emoji, pos.x, pos.y);
                    
                    // 像素阴影
                    ctx.save();
                    ctx.globalAlpha = 0.3;
                    ctx.fillStyle = '#000';
                    ctx.fillRect(pos.x - 15 * scale, pos.y + 3, 30 * scale, 6 * scale);
                    ctx.restore();
                }
            }

            renderPlayer() {
                const ctx = this.ctx;
                const pos = this.getScreenPosition(this.player.lane, 0);
                let y = pos.y;
                
                // 跳跃偏移
                y -= this.player.jumpY;
                
                // 跑步动画帧（2帧跑步循环）
                const runFrame = Math.floor(this.player.animFrame * 2) % 2;
                const bobOffset = Math.sin(this.player.animFrame * 2) * 6;
                y += bobOffset;
                
                // 跑步背影动画 - 只在非滑铲状态显示
                if (!this.player.isSliding && this.state !== GameState.GAME_OVER) {
                    // 绘制跑步背影人物
                    ctx.save();
                    ctx.translate(pos.x, y);
                    
                    // 人物参数
                    const bodyHeight = 45;
                    const headRadius = 12;
                    const legLength = 30;
                    const armLength = 25;
                    const bodyWidth = 18;
                    
                    // 跑步动画腿部位置
                    const legSwing = Math.sin(this.player.animFrame * 2) * 20;
                    const armSwing = Math.sin(this.player.animFrame * 2 + Math.PI) * 15;
                    
                    // 身体颜色
                    ctx.fillStyle = '#4a90d9';  // 蓝色衣服
                    ctx.strokeStyle = '#2d5a87';
                    ctx.lineWidth = 2;
                    
                    // 绘制阴影
                    ctx.save();
                    ctx.globalAlpha = 0.3;
                    ctx.fillStyle = '#000';
                    ctx.beginPath();
                    ctx.ellipse(0, 5, 25, 8, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                    
                    // 绘制左腿（背面视角）
                    ctx.save();
                    ctx.fillStyle = '#3d5a80';
                    ctx.strokeStyle = '#2d4a6a';
                    ctx.lineWidth = 2;
                    
                    // 左腿
                    ctx.translate(-5, -legLength);
                    ctx.rotate((legSwing * Math.PI) / 180);
                    ctx.beginPath();
                    ctx.roundRect(-5, 0, 10, legLength, 3);
                    ctx.fill();
                    ctx.stroke();
                    // 左脚
                    ctx.fillStyle = '#333';
                    ctx.fillRect(-6, legLength - 3, 14, 5);
                    ctx.restore();
                    
                    // 绘制右腿
                    ctx.save();
                    ctx.fillStyle = '#3d5a80';
                    ctx.strokeStyle = '#2d4a6a';
                    ctx.lineWidth = 2;
                    ctx.translate(5, -legLength);
                    ctx.rotate((-legSwing * Math.PI) / 180);
                    ctx.beginPath();
                    ctx.roundRect(-5, 0, 10, legLength, 3);
                    ctx.fill();
                    ctx.stroke();
                    // 右脚
                    ctx.fillStyle = '#333';
                    ctx.fillRect(-6, legLength - 3, 14, 5);
                    ctx.restore();
                    
                    // 绘制身体（背部）
                    ctx.fillStyle = '#4a90d9';
                    ctx.strokeStyle = '#2d5a87';
                    ctx.beginPath();
                    ctx.roundRect(-bodyWidth/2, -bodyHeight - headRadius * 2, bodyWidth, bodyHeight, 5);
                    ctx.fill();
                    ctx.stroke();
                    
                    // 绘制背包（侧面可见）
                    ctx.fillStyle = '#8b4513';
                    ctx.strokeStyle = '#5d2e0a';
                    ctx.fillRect(-bodyWidth/2 - 4, -bodyHeight - headRadius * 2 + 10, 6, 20);
                    ctx.stroke();
                    
                    // 绘制左臂
                    ctx.save();
                    ctx.fillStyle = '#f5c6a5';  // 肤色
                    ctx.translate(-bodyWidth/2, -bodyHeight - headRadius * 2 + 5);
                    ctx.rotate(((armSwing - 30) * Math.PI) / 180);
                    ctx.beginPath();
                    ctx.roundRect(-3, 0, 6, armLength - 5, 3);
                    ctx.fill();
                    ctx.strokeStyle = '#d4a574';
                    ctx.stroke();
                    ctx.restore();
                    
                    // 绘制右臂
                    ctx.save();
                    ctx.fillStyle = '#f5c6a5';
                    ctx.translate(bodyWidth/2, -bodyHeight - headRadius * 2 + 5);
                    ctx.rotate(((-armSwing + 30) * Math.PI) / 180);
                    ctx.beginPath();
                    ctx.roundRect(-3, 0, 6, armLength - 5, 3);
                    ctx.fill();
                    ctx.strokeStyle = '#d4a574';
                    ctx.stroke();
                    ctx.restore();
                    
                    // 绘制头部（背面）
                    ctx.fillStyle = '#f5c6a5';
                    ctx.strokeStyle = '#d4a574';
                    ctx.beginPath();
                    ctx.arc(0, -bodyHeight - headRadius, headRadius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                    
                    // 绘制头发（后脑勺）
                    ctx.fillStyle = '#4a3728';
                    ctx.beginPath();
                    ctx.arc(0, -bodyHeight - headRadius - 2, headRadius - 2, Math.PI * 0.8, Math.PI * 2.2);
                    ctx.fill();
                    
                    // 跳跃时的上升效果
                    if (this.player.jumpY > 0) {
                        // 添加向上的飘带效果
                        ctx.globalAlpha = 0.5;
                        ctx.fillStyle = '#87ceeb';
                        for (let i = 0; i < 3; i++) {
                            const offsetX = (i - 1) * 15 + Math.sin(this.player.animFrame * 3 + i) * 5;
                            ctx.beginPath();
                            ctx.moveTo(offsetX, 10 + i * 8);
                            ctx.quadraticCurveTo(offsetX + 10, 20 + i * 8, offsetX, 35 + i * 8);
                            ctx.quadraticCurveTo(offsetX - 10, 20 + i * 8, offsetX, 10 + i * 8);
                            ctx.fill();
                        }
                    }
                    
                    ctx.restore();
                } else if (this.player.isSliding) {
                    // 滑铲状态 - 趴下的人物
                    ctx.save();
                    ctx.translate(pos.x, y);
                    
                    ctx.fillStyle = '#4a90d9';
                    ctx.strokeStyle = '#2d5a87';
                    ctx.lineWidth = 2;
                    
                    // 绘制阴影
                    ctx.save();
                    ctx.globalAlpha = 0.3;
                    ctx.fillStyle = '#000';
                    ctx.beginPath();
                    ctx.ellipse(0, 5, 40, 10, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                    
                    // 趴下的身体
                    ctx.translate(0, -15);
                    ctx.rotate(Math.PI / 6);
                    ctx.beginPath();
                    ctx.roundRect(-25, -10, 50, 20, 8);
                    ctx.fill();
                    ctx.stroke();
                    
                    // 头
                    ctx.fillStyle = '#f5c6a5';
                    ctx.beginPath();
                    ctx.arc(-20, -5, 10, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                    
                    // 腿
                    ctx.fillStyle = '#3d5a80';
                    ctx.fillRect(15, -5, 25, 8);
                    
                    ctx.restore();
                } else if (this.state === GameState.GAME_OVER) {
                    // 死亡状态 - 显示骷髅emoji
                    ctx.save();
                    ctx.translate(pos.x, y - 30);
                    ctx.font = '50px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'bottom';
                    ctx.fillText('💀', 0, 0);
                    ctx.restore();
                    
                    // 像素风格阴影
                    ctx.save();
                    ctx.globalAlpha = 0.4;
                    ctx.fillStyle = '#000';
                    ctx.fillRect(pos.x - 15, pos.y + 5, 30, 8);
                    ctx.restore();
                }
            }

            getScale(z) {
                const maxZ = 3000;  // 从2000改为3000
                const minZ = -50;
                const normalizedZ = (z - minZ) / (maxZ - minZ);
                return Math.max(0.1, 1 - normalizedZ * (1 - CONFIG.PERSPECTIVE_SCALE));
            }

            getScreenPosition(lane, z) {
                const vanishX = this.centerX;  // 屏幕正中央
                const vanishY = this.horizonY;
                
                // 玩家(z=0)使用playerBaseY，其他使用透视计算
                if (z <= 0) {
                    const roadWidthBottom = this.roadWidthBottom;
                    const laneOffset = (lane - 1) * (roadWidthBottom / CONFIG.LANE_COUNT);
                    const x = vanishX + laneOffset;
                    return { x, y: this.playerBaseY };
                }
                
                const scale = this.getScale(z);
                const roadWidthAtZ = this.roadWidthBottom * scale;
                const laneOffset = (lane - 1) * (roadWidthAtZ / CONFIG.LANE_COUNT);
                const x = vanishX + laneOffset;
                const y = vanishY + (this.playerBaseY - vanishY) * (1 - (1 - scale));

                return { x, y };
            }
            
            // ========== 粒子系统（像素风格） ==========
            spawnCollectParticles(x, y) {
                for (let i = 0; i < 8; i++) {
                    const angle = (Math.PI * 2 * i) / 8;
                    const speed = 2 + Math.random() * 3;
                    this.particles.push({
                        x: x,
                        y: y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed - 2,
                        life: 1,
                        decay: 0.02 + Math.random() * 0.02,
                        size: 4 + Math.random() * 4,
                        color: Math.random() > 0.5 ? '#ffd700' : '#fbbf24'
                    });
                }
            }
            
            spawnDustParticle() {
                const pos = this.getScreenPosition(this.player.lane, 30);
                this.dustParticles.push({
                    x: pos.x + (Math.random() - 0.5) * 40,
                    y: pos.y - 20,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: -0.5 - Math.random() * 0.5,
                    life: 1,
                    decay: 0.03 + Math.random() * 0.02,
                    size: 2 + Math.random() * 3,
                });
            }
            
            updateParticles(dt) {
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.1; // 重力
                    p.life -= p.decay;
                    if (p.life <= 0) {
                        this.particles.splice(i, 1);
                    }
                }
            }
            
            updateDustParticles(dt) {
                for (let i = this.dustParticles.length - 1; i >= 0; i--) {
                    const p = this.dustParticles[i];
                    p.x += p.vx - this.speed * 0.3;
                    p.y += p.vy;
                    p.life -= p.decay;
                    if (p.life <= 0) {
                        this.dustParticles.splice(i, 1);
                    }
                }
            }
            
            renderParticles() {
                const ctx = this.ctx;
                for (const p of this.particles) {
                    ctx.save();
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    // 像素风格粒子（方形）
                    const size = p.size * p.life;
                    ctx.fillRect(p.x - size/2, p.y - size/2, size, size);
                    ctx.restore();
                }
            }
            
            renderDustParticles() {
                const ctx = this.ctx;
                for (const p of this.dustParticles) {
                    ctx.save();
                    ctx.globalAlpha = p.life * 0.5;
                    ctx.fillStyle = '#a08060';
                    // 像素风格尘土
                    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
                    ctx.restore();
                }
            }
        }

        // 启动游戏
        window.addEventListener('DOMContentLoaded', () => {
            new TempleRunGame();
        });
    </script>
</body>
</html>
